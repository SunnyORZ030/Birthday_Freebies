services:
  postgres:
    image: postgres:16-alpine
    container_name: birthday-freebies-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-birthday_freebies}
      POSTGRES_USER: ${POSTGRES_USER:-birthday_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-birthday_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-birthday_user} -d ${POSTGRES_DB:-birthday_freebies}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

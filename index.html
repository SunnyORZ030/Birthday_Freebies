<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.region-select { padding: 5px 10px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; font-weight: 500; }
.filter-btn:hover { background: var(--color-background-secondary); }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
td { padding: 9px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
tr.updated-row td { background: #FAEEDA22; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.cp-high { background: #EAF3DE; color: #27500A; }
.cp-medium { background: #FAEEDA; color: #633806; }
.cp-low { background: #FCEBEB; color: #791F1F; }
.dist-near { color: #1D9E75; font-weight: 500; }
.dist-medium { color: #BA7517; font-weight: 500; }
.cat-food { background: #FBEAF0; color: #72243E; }
.cat-drink { background: #E6F1FB; color: #0C447C; }
.cat-dessert { background: #EEEDFE; color: #3C3489; }
.cat-beauty { background: #E1F5EE; color: #085041; }
.store-name { font-weight: 500; display: flex; align-items: center; gap: 5px; }
.note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
</style>
<div class="wrap">
<div class="filters">
  <select id="regionSelect" class="region-select" onchange="changeRegion(this.value)"></select>
  <button id="allBtn" class="filter-btn active" onclick="filter('all',this)">All</button>
  <button class="filter-btn" onclick="filter('food',this)">Food / Fast Food</button>
  <button class="filter-btn" onclick="filter('drink',this)">Drinks / Coffee</button>
  <button class="filter-btn" onclick="filter('dessert',this)">Dessert / Ice Cream</button>
  <button class="filter-btn" onclick="filter('beauty',this)">Beauty / Retail</button>
  <button class="filter-btn" onclick="filter('cp-high',this)">High Value</button>
  <button class="filter-btn" onclick="filter('cp-medium',this)">Medium Value</button>
  <button class="filter-btn" onclick="filter('4/1',this)">4/1</button>
  <button class="filter-btn" onclick="filter('4/2',this)">4/2</button>
  <button class="filter-btn" onclick="filter('batch-flex',this)">Flexible</button>
</div>
<div style="overflow-x:auto;">
<table>
<thead>
<tr>
  <th>Store</th><th>Category</th><th>Freebie</th><th>Membership Required?</th><th>Redemption Window</th><th>Value</th><th>Distance to SJSU</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
<script src="freebies-data.js"></script>
<script>
const regionData = window.BIRTHDAY_FREEBIES_DATA_BY_REGION || { bay_area: window.BIRTHDAY_FREEBIES_DATA || [] };
const regionLabels = {
  bay_area: 'Bay Area (SJSU)'
};
let currentRegion = 'bay_area';
let data = regionData[currentRegion] || [];
const CP_HIGH = '\u9AD8';
const CP_MEDIUM = '\u4E2D';
const CP_LOW = '\u4F4E';
const DIST_NEAR = '\u8FD1';
const DIST_MEDIUM = '\u4E2D';
const DIST_FAR = '\u9060';
const BATCH_FLEX = '\u6709\u7A7A\u518D\u53BB';

let current = 'all';
function updateAllButtonCount() {
  const allBtn = document.getElementById('allBtn');
  if (allBtn) allBtn.textContent = `All (${data.length})`;
}
function resetActiveFilter() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const allBtn = document.getElementById('allBtn');
  if (allBtn) allBtn.classList.add('active');
}
function changeRegion(regionKey) {
  currentRegion = regionKey;
  data = regionData[currentRegion] || [];
  current = 'all';
  resetActiveFilter();
  updateAllButtonCount();
  render();
}
function filter(key, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  current = key;
  render();
}
function initRegions() {
  const select = document.getElementById('regionSelect');
  const keys = Object.keys(regionData);
  if (!keys.length || !select) return;
  select.innerHTML = keys.map(k => `<option value="${k}">${regionLabels[k] || k}</option>`).join('');
  if (!regionData[currentRegion]) currentRegion = keys[0];
  select.value = currentRegion;
  data = regionData[currentRegion] || [];
}
function catLabel(c) {
  return { food:'Food / Fast Food', drink:'Drinks / Coffee', dessert:'Dessert / Ice Cream', beauty:'Beauty / Retail' }[c] || c;
}
function cpLabel(cp) {
  return { [CP_HIGH]:'High', [CP_MEDIUM]:'Medium', [CP_LOW]:'Low' }[cp] || cp;
}
function cpClass(cp) {
  return { [CP_HIGH]:'high', [CP_MEDIUM]:'medium', [CP_LOW]:'low' }[cp] || 'medium';
}
function distLabel(dist) {
  return { [DIST_NEAR]:'Near', [DIST_MEDIUM]:'Medium', [DIST_FAR]:'Far' }[dist] || dist;
}
function distClass(dist) {
  return { [DIST_NEAR]:'near', [DIST_MEDIUM]:'medium', [DIST_FAR]:'far' }[dist] || 'medium';
}
function render() {
  const cpRank = { [CP_HIGH]: 3, [CP_MEDIUM]: 2, [CP_LOW]: 1 };
  const distRank = { [DIST_NEAR]: 3, [DIST_MEDIUM]: 2, [DIST_FAR]: 1 };
  const rows = data.filter(d => {
    if (current === 'all') return true;
    if (current === 'cp-high') return d.cp === CP_HIGH;
    if (current === 'cp-medium') return d.cp === CP_MEDIUM;
    if (current === '4/1' || current === '4/2') return d.batch === current;
    if (current === 'batch-flex') return d.batch === BATCH_FLEX;
    if (current === 'updated') return d.u;
    return d.cat === current;
  }).sort((a, b) => {
    const cpDiff = (cpRank[b.cp] || 0) - (cpRank[a.cp] || 0);
    if (cpDiff !== 0) return cpDiff;
    return (distRank[b.dist] || 0) - (distRank[a.dist] || 0);
  });
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary)">No matching entries found.</td></tr>'; return; }
  tbody.innerHTML = rows.map(d => {
    return `<tr class="${d.u ? 'updated-row' : ''}">
      <td>
        <div class="store-name">${d.name}</div>
        <div class="note">${d.note}</div>
      </td>
      <td><span class="badge cat-${d.cat}">${catLabel(d.cat)}</span></td>
      <td style="max-width:190px;font-size:12px">${d.item}</td>
      <td style="font-size:12px">${d.member}</td>
      <td style="white-space:nowrap;font-size:12px">${d.window}</td>
      <td><span class="badge cp-${cpClass(d.cp)}">${cpLabel(d.cp)}</span></td>
      <td class="dist-${distClass(d.dist)}">${distLabel(d.dist)}</td>
    </tr>`;
  }).join('');
}
initRegions();
updateAllButtonCount();
render();
</script>

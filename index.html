<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Freebies Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.region-select { padding: 5px 10px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; font-weight: 500; }
.filter-btn:hover { background: var(--color-background-secondary); }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
td { padding: 9px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
tr.updated-row td { background: #FAEEDA22; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.cp-high { background: #EAF3DE; color: #27500A; }
.cp-medium { background: #FAEEDA; color: #633806; }
.cp-low { background: #FCEBEB; color: #791F1F; }
.dist-near { color: #1D9E75; font-weight: 500; }
.dist-medium { color: #BA7517; font-weight: 500; }
.cat-food { background: #FBEAF0; color: #72243E; }
.cat-drink { background: #E6F1FB; color: #0C447C; }
.cat-dessert { background: #EEEDFE; color: #3C3489; }
.cat-beauty { background: #E1F5EE; color: #085041; }
.store-name { font-weight: 500; display: flex; align-items: center; gap: 5px; }
.note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">
<div class="filters">
  <select id="regionSelect" class="region-select" onchange="changeRegion(this.value)"></select>
  <button id="allBtn" class="filter-btn active" onclick="filter('all',this)">All</button>
  <button id="foodBtn" class="filter-btn" onclick="filter('food',this)">Food / Fast Food</button>
  <button id="drinkBtn" class="filter-btn" onclick="filter('drink',this)">Drinks / Coffee</button>
  <button id="dessertBtn" class="filter-btn" onclick="filter('dessert',this)">Dessert / Ice Cream</button>
  <button id="beautyBtn" class="filter-btn" onclick="filter('beauty',this)">Beauty / Retail</button>
  <button id="cpHighBtn" class="filter-btn" onclick="filter('cp-high',this)">High Value</button>
  <button id="cpMediumBtn" class="filter-btn" onclick="filter('cp-medium',this)">Medium Value</button>
  <button class="filter-btn" onclick="filter('4/1',this)">4/1</button>
  <button class="filter-btn" onclick="filter('4/2',this)">4/2</button>
  <button id="batchFlexBtn" class="filter-btn" onclick="filter('batch-flex',this)">Flexible</button>
</div>
<div style="overflow-x:auto;">
<table>
<thead>
<tr>
  <th id="thStore">Store</th><th id="thCategory">Category</th><th id="thFreebie">Freebie</th><th id="thMember">Membership Required?</th><th id="thWindow">Redemption Window</th><th id="thValue">Value</th><th id="thDistance">Distance to SJSU</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
<script src="freebies-data.js" charset="UTF-8"></script>
<script>
const regionData = window.BIRTHDAY_FREEBIES_DATA_BY_REGION || { bay_area: window.BIRTHDAY_FREEBIES_DATA || [] };
const REGION_LABELS = {
  bay_area: {
    en: 'Bay Area (SJSU)',
    zh: '\u7063\u5340 (SJSU)'
  }
};
const I18N = {
  en: {
    pageTitle: 'Birthday Freebies Tracker',
    all: 'All',
    foodBtn: 'Food / Fast Food',
    drinkBtn: 'Drinks / Coffee',
    dessertBtn: 'Dessert / Ice Cream',
    beautyBtn: 'Beauty / Retail',
    cpHighBtn: 'High Value',
    cpMediumBtn: 'Medium Value',
    batchFlexBtn: 'Flexible',
    thStore: 'Store',
    thCategory: 'Category',
    thFreebie: 'Freebie',
    thMember: 'Membership Required?',
    thWindow: 'Redemption Window',
    thValue: 'Value',
    thDistance: 'Distance to SJSU',
    noResults: 'No matching entries found.',
    cat_food: 'Food / Fast Food',
    cat_drink: 'Drinks / Coffee',
    cat_dessert: 'Dessert / Ice Cream',
    cat_beauty: 'Beauty / Retail',
    cpHigh: 'High',
    cpMedium: 'Medium',
    cpLow: 'Low',
    distNear: 'Near',
    distMedium: 'Medium',
    distFar: 'Far'
  },
  zh: {
    pageTitle: '\u751F\u65E5\u512A\u60E0\u8FFD\u8E64\u8868',
    all: '\u5168\u90E8',
    foodBtn: '\u9910\u5EF3/\u901F\u98DF',
    drinkBtn: '\u98F2\u6599/\u5496\u5561',
    dessertBtn: '\u751C\u9EDE/\u51B0\u54C1',
    beautyBtn: '\u7F8E\u599D/\u96F6\u552E',
    cpHighBtn: '\u9AD8 CP \u503C',
    cpMediumBtn: '\u4E2D CP \u503C',
    batchFlexBtn: '\u6709\u7A7A\u518D\u53BB',
    thStore: '\u5E97\u540D',
    thCategory: '\u985E\u5225',
    thFreebie: '\u8D08\u9001\u7269\u54C1',
    thMember: '\u9700\u6703\u54E1\uFF1F',
    thWindow: '\u9818\u53D6\u671F\u9650',
    thValue: 'CP\u503C',
    thDistance: '\u8DDD SJSU',
    noResults: '\u6C92\u6709\u7B26\u5408\u689D\u4EF6\u7684\u9805\u76EE',
    cat_food: '\u9910\u5EF3/\u901F\u98DF',
    cat_drink: '\u98F2\u6599/\u5496\u5561',
    cat_dessert: '\u751C\u9EDE/\u51B0\u54C1',
    cat_beauty: '\u7F8E\u599D/\u96F6\u552E',
    cpHigh: '\u9AD8',
    cpMedium: '\u4E2D',
    cpLow: '\u4F4E',
    distNear: '\u8FD1',
    distMedium: '\u4E2D',
    distFar: '\u9060'
  }
};
let currentRegion = 'bay_area';
let data = regionData[currentRegion] || [];
const CP_HIGH = '\u9AD8';
const CP_MEDIUM = '\u4E2D';
const CP_LOW = '\u4F4E';
const DIST_NEAR = '\u8FD1';
const DIST_MEDIUM = '\u4E2D';
const DIST_FAR = '\u9060';
const BATCH_FLEX = '\u6709\u7A7A\u518D\u53BB';
let currentLocale = 'en';

let current = 'all';
function detectLocale() {
  const raw = ((navigator.languages && navigator.languages[0]) || navigator.language || 'en').toLowerCase();
  return raw.startsWith('zh') ? 'zh' : 'en';
}
function t(key) {
  return (I18N[currentLocale] && I18N[currentLocale][key]) || I18N.en[key] || key;
}
function regionLabel(regionKey) {
  const label = REGION_LABELS[regionKey];
  if (!label) return regionKey;
  return label[currentLocale] || label.en || regionKey;
}
function applyI18nText() {
  document.documentElement.lang = currentLocale === 'zh' ? 'zh-Hant' : 'en';
  document.title = t('pageTitle');
  const ids = ['foodBtn', 'drinkBtn', 'dessertBtn', 'beautyBtn', 'cpHighBtn', 'cpMediumBtn', 'batchFlexBtn', 'thStore', 'thCategory', 'thFreebie', 'thMember', 'thWindow', 'thValue', 'thDistance'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = t(id);
  });
}
function updateAllButtonCount() {
  const allBtn = document.getElementById('allBtn');
  if (allBtn) allBtn.textContent = `${t('all')} (${data.length})`;
}
function resetActiveFilter() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const allBtn = document.getElementById('allBtn');
  if (allBtn) allBtn.classList.add('active');
}
function changeRegion(regionKey) {
  currentRegion = regionKey;
  data = regionData[currentRegion] || [];
  current = 'all';
  resetActiveFilter();
  updateAllButtonCount();
  render();
}
function filter(key, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  current = key;
  render();
}
function initRegions() {
  const select = document.getElementById('regionSelect');
  const keys = Object.keys(regionData);
  if (!keys.length || !select) return;
  select.innerHTML = keys.map(k => `<option value="${k}">${regionLabel(k)}</option>`).join('');
  if (!regionData[currentRegion]) currentRegion = keys[0];
  select.value = currentRegion;
  data = regionData[currentRegion] || [];
}
function catLabel(c) {
  return { food:t('cat_food'), drink:t('cat_drink'), dessert:t('cat_dessert'), beauty:t('cat_beauty') }[c] || c;
}
function cpLabel(cp) {
  return { [CP_HIGH]:t('cpHigh'), [CP_MEDIUM]:t('cpMedium'), [CP_LOW]:t('cpLow') }[cp] || cp;
}
function cpClass(cp) {
  return { [CP_HIGH]:'high', [CP_MEDIUM]:'medium', [CP_LOW]:'low' }[cp] || 'medium';
}
function distLabel(dist) {
  return { [DIST_NEAR]:t('distNear'), [DIST_MEDIUM]:t('distMedium'), [DIST_FAR]:t('distFar') }[dist] || dist;
}
function distClass(dist) {
  return { [DIST_NEAR]:'near', [DIST_MEDIUM]:'medium', [DIST_FAR]:'far' }[dist] || 'medium';
}
const CONTENT_REPLACEMENTS_EN = [
  ['需要', 'Required'],
  ['不需要', 'Not required'],
  ['生日當天', 'Birthday day'],
  ['生日月份', 'Birthday month'],
  ['免費', 'Free'],
  ['任意尺寸', 'Any size'],
  ['任意', 'Any'],
  ['當天', 'same day'],
  ['有效', 'valid'],
  ['天內', 'days'],
  ['前一天', 'day before'],
  ['後一天', 'day after'],
  ['共', 'total'],
  ['加入', 'join'],
  ['帳號', 'account'],
  ['消費', 'purchase'],
  ['不含', 'excluding'],
  ['實體店', 'in-store'],
  ['線上', 'online'],
  ['門市', 'store location'],
  ['約', 'about '],
  ['英里', 'miles'],
  ['需', 'must'],
  ['才能', 'to'],
  ['領取', 'redeem'],
  ['條件', 'conditions'],
  ['最寬鬆', 'most flexible'],
  ['以官方通知為準', 'subject to official notice']
];
function localizeContentText(text) {
  if (typeof text !== 'string') return text;
  if (currentLocale !== 'en') return text;
  let output = text;
  CONTENT_REPLACEMENTS_EN.forEach(([from, to]) => {
    output = output.split(from).join(to);
  });
  return output;
}
function render() {
  const cpRank = { [CP_HIGH]: 3, [CP_MEDIUM]: 2, [CP_LOW]: 1 };
  const distRank = { [DIST_NEAR]: 3, [DIST_MEDIUM]: 2, [DIST_FAR]: 1 };
  const rows = data.filter(d => {
    if (current === 'all') return true;
    if (current === 'cp-high') return d.cp === CP_HIGH;
    if (current === 'cp-medium') return d.cp === CP_MEDIUM;
    if (current === '4/1' || current === '4/2') return d.batch === current;
    if (current === 'batch-flex') return d.batch === BATCH_FLEX;
    if (current === 'updated') return d.u;
    return d.cat === current;
  }).sort((a, b) => {
    const cpDiff = (cpRank[b.cp] || 0) - (cpRank[a.cp] || 0);
    if (cpDiff !== 0) return cpDiff;
    return (distRank[b.dist] || 0) - (distRank[a.dist] || 0);
  });
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--color-text-tertiary)">${t('noResults')}</td></tr>`; return; }
  tbody.innerHTML = rows.map(d => {
    return `<tr class="${d.u ? 'updated-row' : ''}">
      <td>
        <div class="store-name">${localizeContentText(d.name)}</div>
        <div class="note">${localizeContentText(d.note)}</div>
      </td>
      <td><span class="badge cat-${d.cat}">${catLabel(d.cat)}</span></td>
      <td style="max-width:190px;font-size:12px">${localizeContentText(d.item)}</td>
      <td style="font-size:12px">${localizeContentText(d.member)}</td>
      <td style="white-space:nowrap;font-size:12px">${localizeContentText(d.window)}</td>
      <td><span class="badge cp-${cpClass(d.cp)}">${cpLabel(d.cp)}</span></td>
      <td class="dist-${distClass(d.dist)}">${distLabel(d.dist)}</td>
    </tr>`;
  }).join('');
}
currentLocale = detectLocale();
applyI18nText();
initRegions();
updateAllButtonCount();
render();
</script>
</body>
</html>

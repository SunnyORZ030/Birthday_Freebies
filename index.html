  <!-- Main stylesheet. -->
  <link rel="stylesheet" href="assets/styles/main.css">

<body>
  <!-- Main app container. -->
  <div class="wrap">
    <!-- Interactive filters for region and category. -->
    <div class="filters">
      <select id="regionSelect" class="region-select" onchange="changeRegion(this.value)"></select>
      <button id="allBtn" class="filter-btn active" onclick="filter('all',this)">All</button>
      <button id="foodBtn" class="filter-btn" onclick="filter('food',this)">Food / Fast Food</button>
      <button id="drinkBtn" class="filter-btn" onclick="filter('drink',this)">Drinks / Coffee</button>
      <button id="dessertBtn" class="filter-btn" onclick="filter('dessert',this)">Dessert / Ice Cream</button>
      <button id="beautyBtn" class="filter-btn" onclick="filter('beauty',this)">Beauty / Retail</button>
    </div>
    <div id="dataSourceBadge" class="data-source-badge" aria-live="polite"></div>

    <!-- Responsive table wrapper for narrow screens. -->
    <div style="overflow-x:auto;">
      <table>
        <!-- Column headers are localized in JavaScript. -->
        <thead>
          <tr>
            <th id="thStore">Store</th><th id="thCategory">Category</th><th id="thFreebie">Freebie</th><th id="thMember">Membership Required?</th><th id="thWindow">Redemption Window</th>
          </tr>
        </thead>
        <!-- Data rows are injected by render(). -->
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Localization and display metadata. -->
  <script src="assets/data/i18n-data.js" charset="UTF-8"></script>
  <!-- Main application logic. -->
  <script src="assets/scripts/app.js" charset="UTF-8"></script>
</body>
</html>
